<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="p9.css">
</head>
<body>
    <div class="hero">
        <div class="container">
            <div class="clock">

                <!-- TIME -->
                <div class="time">
                    <span id="hrs">00</span>
                    <span>:</span>
                    <span id="min">00</span>
                    <span>:</span>
                    <span id="sec">00</span>
                </div>

                <!-- DATE + AMPM -->
                <div class="extra">
                    <div class="date" id="date"></div>
                    <div class="ampm" id="ampm"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="p9.js"></script>
</body>
</html>
